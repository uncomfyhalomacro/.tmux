set-option -ga terminal-overrides ",alacritty,foot*,xterm-256color:Tc"
set -as terminal-features 'alacritty:rgb'
set -as terminal-features 'foot:rgb'
set -as terminal-features 'foot-extra:rgb'
set -g mouse on
set-window-option -g aggressive-resize
bind-key = select-layout even-horizontal
bind-key \\ select-layout even-vertical
bind-key c run-shell "tnw"
bind-key ! run-shell "tnbp"
bind-key j command-prompt -p "join pane from:"  "join-pane -s '%%'"
bind-key s command-prompt -p "send pane to:"  "join-pane -t '%%'"
bind-key X set-window-option synchronize-panes\; display-message "synchronize-panes is now #{?pane_synchronized,on,off}"

# ~/.tmux.conf
# --- Gruvbox Appearance Settings ---

# 2. MAIN STATUS BAR
# Set the main background and foreground colors for the status bar
# bg=colour235 (dark grey)
# fg=colour245 (light grey)
set -g status-style "fg=colour245,bg=colour235"

# Set the refresh interval for status bar elements (like the clock)
set -g status-interval 15

# 3. STATUS BAR CONTENT
# We use status-left and status-right to style content.
# #[default] resets the style.

# --- LEFT SIDE (Session Name) ---
# bg=colour142 (green), fg=colour235 (dark grey)
set -g status-left-length 40
set -g status-left "#[fg=colour235,bg=colour142,bold] #S #[default]"

# --- RIGHT SIDE (Host, Date, Time) ---
# colour109 (blue), colour214 (yellow)
set -g status-right-length 60
set -g status-right "#[fg=colour109,bold] #H #[default]#[fg=colour245] | %d %b %Y #[default]#[fg=colour214,bold] | %H:%M #[default]"

# 4. WINDOW LIST
# Center the window list
set -g status-justify left

# --- Inactive Windows ---
# Use muted colors from the main status bar
set -g window-status-format "#[fg=colour255,bg=colour235] #I:#W#F #[default]"

# --- Active Window ---
# Use a bright accent color
# bg=colour214 (yellow), fg=colour235 (dark grey)
set -g window-status-current-format "#[fg=colour235,bg=colour214,bold] #I:#W#F #[default]"

# Set a separator between windows
set -g window-status-separator " "

# 5. PANES
# --- Inactive Pane Borders ---
# Use a muted, dark grey
set -g pane-border-style "fg=colour240"

# --- Active Pane Border ---
# Use a bright accent color
set -g pane-active-border-style "fg=colour214"

# 6. COMMAND/MESSAGE LINE
# Style for the command line (when you press Prefix + :)
# bg=colour214 (yellow), fg=colour235 (dark grey)
set -g message-style "fg=colour235,bg=colour214,bold"

# 7. CLOCK
# Style for the full-screen clock (Prefix + t)
# colour109 (blue)
set -g clock-mode-colour colour109
